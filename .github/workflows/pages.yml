name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          cp .nojekyll index.html llms.txt _site/
          # Every root-level doc, globbed rather than named. The previous list was
          # hardcoded, so deleting a root doc broke the deploy and adding one
          # (api-surface.md) shipped a 404 that llms.txt pointed straight at.
          find . -maxdepth 1 -name '*.md' -exec cp {} _site/ \;
          cp -R components demos foundations patterns _site/

      - name: Verify every llms.txt link resolves
        run: |
          # The deploy is the last place a dead link is cheap to catch. Anything
          # llms.txt names must exist in _site, or an agent following the index
          # hits a 404 we shipped ourselves.
          missing=0
          outside=0
          while read -r target; do
            case "$target" in
              http*|\#*|"") continue ;;
              ../*)
                # Escapes the site root, so it is a 404 for every reader. Warned,
                # not fatal, until the .claude/team-rule links are dealt with.
                echo "::warning::llms.txt links $target, which is outside the site and cannot resolve"
                outside=$((outside + 1))
                continue
                ;;
            esac
            if [ ! -f "_site/$target" ]; then
              echo "::error::llms.txt links $target, which is not in the built site"
              missing=$((missing + 1))
            fi
          done < <(grep -o '](\([^)]*\))' llms.txt | sed 's/](\(.*\))/\1/')
          if [ "$missing" -gt 0 ]; then
            echo "$missing link(s) in llms.txt point at files the site does not contain — refusing to deploy."
            exit 1
          fi
          echo "All in-site llms.txt links resolve. $outside link(s) point outside the site."
        shell: bash

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
